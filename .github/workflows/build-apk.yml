name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          mkdir twa-build && cd twa-build
          bubblewrap init --manifest "https://alfkalf.github.io/ktm790-couples-serrage/manifest.json" \
            --directory . 2>/dev/null || true

      - name: Fix splash screen value
        run: |
          sed -i 's/splashScreenFadeOutDuration: ,/splashScreenFadeOutDuration: 300,/' \
            twa-build/app/build.gradle || true

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias ktm890 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore twa-build/android.keystore \
            -storepass android -keypass android \
            -dname "CN=KTM890, O=alfkalf, C=FR"

      - name: Build debug APK (no signing needed)
        run: cd twa-build && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTM890-debug
          path: twa-build/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
